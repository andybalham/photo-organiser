name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test PhotoOrganiser.Tests --configuration Release

      - name: Publish
        run: >
          dotnet publish PhotoOrganiser/PhotoOrganiser.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish

      - name: Generate checksum
        run: |
          $hash = (Get-FileHash publish/PhotoOrganiser.exe -Algorithm SHA256).Hash
          "$hash  PhotoOrganiser.exe" | Out-File publish/PhotoOrganiser.exe.sha256 -Encoding ascii

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/PhotoOrganiser.exe
            publish/PhotoOrganiser.exe.sha256
          generate_release_notes: true
